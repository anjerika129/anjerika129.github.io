<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙のお試しゲーム🎀</title>
  <style>
    @keyframes sparkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: #fff9fb; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 2rem 1rem; }
    .sparkle { animation: sparkle 1.5s infinite; display: inline-block; font-size: 14px; }
    .float { animation: float 3s ease-in-out infinite; }
    .pop { animation: pop 0.4s ease forwards; }
    .container { max-width: 600px; width: 100%; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 600; color: #D4537E; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #ED93B1; }
    .card { background: #FBEAF0; border-radius: 16px; border: 0.5px solid #F4C0D1; padding: 1.25rem; margin-bottom: 1rem; }
    .card-label { font-size: 13px; color: #D4537E; font-weight: 600; margin-bottom: 8px; }
    textarea { width: 100%; height: 80px; border: 0.5px solid #F4C0D1; border-radius: 10px; padding: 10px; font-size: 13px; background: #fff; color: #333; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: #D4537E; }
    .methods { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .method-btn { background: #fff; border: 0.5px solid #F4C0D1; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .method-btn:hover { background: #FBEAF0; }
    .method-btn.selected { background: #FBEAF0; border-color: #D4537E; }
    .method-icon { font-size: 20px; margin-bottom: 4px; }
    .method-title { font-size: 12px; color: #993556; font-weight: 600; }
    .method-desc { font-size: 11px; color: #ED93B1; }
    .hanasu-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #F4C0D1, #ED93B1); border: none; border-radius: 12px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; margin-bottom: 1rem; letter-spacing: 0.5px; transition: opacity 0.2s; }
    .hanasu-btn:hover { opacity: 0.9; }
    .result-card { background: #FBEAF0; border-radius: 16px; border: 1px solid #ED93B1; padding: 1.5rem; text-align: center; }
    .result-msg { font-size: 14px; color: #ED93B1; margin-bottom: 12px; }
    .result-icon { font-size: 48px; margin-bottom: 8px; }
    .result-title { font-size: 18px; font-weight: 600; color: #993556; margin-bottom: 8px; }
    .result-desc { font-size: 13px; color: #D4537E; line-height: 1.6; margin-bottom: 16px; }
    .result-sparkles { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .result-method { font-size: 12px; color: #ED93B1; background: #fff; border-radius: 8px; padding: 8px; }
    .footer { text-align: center; margin-top: 2rem; font-size: 11px; color: #ED93B1; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="float" style="font-size:32px; margin-bottom:8px;">🎀</div>
      <h1>宇宙のお試しゲーム</h1>
      <p>イライラを手放したら、ご褒美が降ってくる新感覚ゲーム💕</p>
    </div>

    <div class="card">
      <p class="card-label"><span class="sparkle">✨</span> step 1 — 今日のイライラを入力して</p>
      <textarea id="iraira" placeholder="例：ジムに1年間8800円不当請求されてた😤"></textarea>
    </div>

    <div class="card">
      <p class="card-label"><span class="sparkle">💫</span> step 2 — 手放し方を選んで</p>
      <div class="methods">
        <div class="method-btn" data-method="感謝に変換">
          <div class="method-icon">🙏</div>
          <div class="method-title">感謝に変換</div>
          <div class="method-desc">お世話になったもんね</div>
        </div>
        <div class="method-btn" data-method="大物マインド">
          <div class="method-icon">💅</div>
          <div class="method-title">大物マインド</div>
          <div class="method-desc">これくらいで騒がない</div>
        </div>
        <div class="method-btn" data-method="呼吸で手放す">
          <div class="method-icon">🌸</div>
          <div class="method-title">呼吸で手放す</div>
          <div class="method-desc">ふーっと流す</div>
        </div>
        <div class="method-btn" data-method="未来にフォーカス">
          <div class="method-icon">🔮</div>
          <div class="method-title">未来にフォーカス</div>
          <div class="method-desc">もっといいことくる</div>
        </div>
      </div>
    </div>

    <button class="hanasu-btn" id="hanasu-btn">🎀 手放す！ご褒美を受け取る 🎀</button>

    <div id="result-area" style="display:none;"></div>

    <div class="footer">made with 💕 &amp; 宇宙エネルギー</div>
  </div>

  <script>
    let selectedMethod = null;

    document.querySelectorAll('.method-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMethod = btn.dataset.method;
      });
    });

    const rewards = [
      { icon:'💘', title:'好きな人とばったり遭遇！', desc:'手放した瞬間、引き寄せが動き出した。今日どこか出かけてみて。' },
      { icon:'💰', title:'臨時収入の予感✨', desc:'手放したエネルギーがお金に変わる。財布の中を確認して。' },
      { icon:'🌸', title:'憧れの人から連絡くる', desc:'軽くなったあなたのオーラが人を引き寄せてる。スマホをチェックして。' },
      { icon:'✨', title:'イケメンと目が合う', desc:'引き寄せ完了。今日の外出は気合い入れて。' },
      { icon:'🎯', title:'天才的なアイデアが降臨', desc:'手放したスペースに創造性が流れ込んできた。メモの準備を。' },
      { icon:'🌈', title:'素敵なご縁が生まれる', desc:'宇宙があなたのために新しい出会いを準備してる。オープンマインドで。' },
      { icon:'💫', title:'夢が急加速する予感', desc:'今日の手放しが大きなターニングポイントになる。信じて動いて。' },
      { icon:'🎀', title:'自分史上最高の一日が来る', desc:'手放しの達人レベルアップ！宇宙があなたに本気を出してる。' },
    ];

    const messages = {
      '感謝に変換': '感謝で手放せた、それだけで宇宙は動き出してる。',
      '大物マインド': '大物マインド発動。この器の大きさ、宇宙は見てる。',
      '呼吸で手放す': 'ふーっと流した瞬間、スペースが生まれた。そこにご褒美が入ってくる。',
      '未来にフォーカス': '未来に意識が向いた。宇宙はあなたの方向に合わせて動く。',
    };

    document.getElementById('hanasu-btn').addEventListener('click', () => {
      const iraira = document.getElementById('iraira').value.trim();
      if (!iraira) { alert('イライラを入力してね💕'); return; }
      if (!selectedMethod) { alert('手放し方を選んでね🎀'); return; }

      const reward = rewards[Math.floor(Math.random() * rewards.length)];
      const msg = messages[selectedMethod];
      const area = document.getElementById('result-area');

      area.style.display = 'block';
      area.innerHTML = `
        <div class="result-card pop">
          <div class="result-msg">${msg}</div>
          <div class="result-icon">${reward.icon}</div>
          <div class="result-title">${reward.title}</div>
          <div class="result-desc">${reward.desc}</div>
          <div class="result-sparkles">
            <span class="sparkle">✨</span>
            <span class="sparkle">💕</span>
            <span class="sparkle">🌸</span>
            <span class="sparkle">✨</span>
          </div>
          <div class="result-method">手放し方：${selectedMethod} 🎀</div>
        </div>
      `;
      area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  </script>
</body>
</html>
