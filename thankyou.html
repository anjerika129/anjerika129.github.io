<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お礼文ジェネレーター 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f2eb;
  --white:#fdfbf7;
  --green:#5a8a6a;
  --green-l:#e8f2ec;
  --green-d:#3d6b50;
  --gold:#c9a05a;
  --gold-l:#f5ead5;
  --beige:#e8e0d0;
  --text:#2d2a20;
  --muted:#8a8070;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;color:var(--text);background:var(--bg);min-height:100vh;}
.wrap{max-width:680px;margin:0 auto;}

.header{background:linear-gradient(135deg,var(--green-d),var(--green));padding:1.6rem 1rem 1.3rem;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);}
.header::after{content:'✿ ✿ ✿';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.5em;}
.header h1{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:white;letter-spacing:.2em;}
.header p{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.3em;margin-top:4px;}

.inner{padding:1rem;}

.form-card{background:var(--white);border-radius:16px;padding:1.2rem;border:1.5px solid var(--beige);margin-bottom:.8rem;box-shadow:0 2px 12px rgba(90,138,106,.08);}
.f-label{font-size:10px;letter-spacing:.2em;color:var(--green);font-weight:700;display:block;margin-bottom:6px;margin-top:.8rem;}
.f-label:first-child{margin-top:0;}
.f-label::before{content:'✿ ';}

.scene-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem;}
.scene-btn{padding:10px 6px;border:1.5px solid var(--beige);border-radius:12px;background:var(--bg);color:var(--muted);font-size:12px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;text-align:center;transition:all .15s;}
.scene-btn:hover{background:var(--green-l);}
.scene-btn.on{background:var(--green);color:white;border-color:var(--green);}
.scene-btn .ic{display:block;font-size:20px;margin-bottom:4px;}

input[type=text],textarea{width:100%;padding:9px 12px;border:1.5px solid var(--beige);border-radius:10px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;margin-bottom:.5rem;box-sizing:border-box;transition:border-color .2s;}
input:focus,textarea:focus{border-color:var(--green);}
textarea{min-height:70px;resize:vertical;}

.tone-row{display:flex;gap:6px;flex-wrap:wrap;}
.tone-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--beige);background:var(--bg);color:var(--muted);font-size:12px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;}
.tone-btn:hover{background:var(--green-l);}
.tone-btn.on{background:var(--green);color:white;border-color:var(--green);}

.gen-btn{width:100%;padding:13px;background:linear-gradient(90deg,var(--green),var(--green-d));color:white;border:none;border-radius:12px;font-family:'Noto Serif JP',serif;font-size:15px;font-weight:400;letter-spacing:.2em;cursor:pointer;transition:opacity .2s;margin:1rem 0;box-shadow:0 4px 15px rgba(90,138,106,.3);}
.gen-btn:hover{opacity:.88;}

.result-box{display:none;background:var(--white);border-radius:16px;padding:1.2rem;border:1.5px solid var(--beige);box-shadow:0 2px 12px rgba(90,138,106,.08);}
.result-box.show{display:block;}

.r-tabs{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;}
.r-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--beige);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;}
.r-tab.on{background:var(--gold);color:white;border-color:var(--gold);}

.r-panel{display:none;}
.r-panel.show{display:block;}
.r-label{font-size:10px;letter-spacing:.2em;color:var(--green);font-weight:700;margin-bottom:.6rem;}
.r-text{font-family:'Noto Serif JP',serif;font-size:14px;line-height:2.2;color:var(--text);white-space:pre-wrap;background:var(--bg);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.8rem;border-left:3px solid var(--green);}
.copy-btn{width:100%;padding:10px;background:var(--green-l);color:var(--green-d);border:1.5px solid #c0d8c8;border-radius:10px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;cursor:pointer;font-weight:700;transition:background .15s;}
.copy-btn:hover{background:#d0e8d8;}

.divider{text-align:center;font-size:11px;color:#b0a890;letter-spacing:.5em;margin:.8rem 0;}

footer{text-align:center;padding:2rem 1rem 1rem;font-size:11px;color:var(--muted);letter-spacing:.15em;}
footer a{color:var(--green);text-decoration:none;}

.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green-d);color:white;padding:6px 18px;border-radius:20px;font-size:12px;transition:transform .3s;z-index:99;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <h1>お礼文ジェネレーター</h1>
  <p>✦ 演奏家のための感謝の言葉 ✦</p>
</div>

<div class="inner">
  <div class="form-card">
    <span class="f-label">シーンを選んで</span>
    <div class="scene-row">
      <button class="scene-btn on" id="s-concert"><span class="ic">🎤</span>演奏会後</button>
      <button class="scene-btn" id="s-lesson"><span class="ic">🎼</span>レッスンのお礼</button>
      <button class="scene-btn" id="s-volunteer"><span class="ic">🌸</span>訪問演奏後</button>
      <button class="scene-btn" id="s-support"><span class="ic">💛</span>サポートへのお礼</button>
    </div>

    <span class="f-label">お相手の名前（任意）</span>
    <input type="text" id="toName" placeholder="例：田中先生・皆さま・○○さん">

    <span class="f-label">ひとこと（特別なエピソードなど）</span>
    <textarea id="episode" placeholder="例：アンコールで盛り上がりました / 先生のご指導のおかげで本番を迎えられました"></textarea>

    <span class="f-label">文体・トーン</span>
    <div class="tone-row">
      <button class="tone-btn on" id="t-formal">🪷 丁寧・格式</button>
      <button class="tone-btn" id="t-warm">🌸 温かみ重視</button>
      <button class="tone-btn" id="t-casual">☕ カジュアル</button>
    </div>
  </div>

  <button class="gen-btn" id="genBtn">✿ お礼文を生成する</button>

  <div class="result-box" id="resultBox">
    <div class="divider">✿ ✿ ✿</div>
    <div class="r-tabs">
      <button class="r-tab on" id="rt-formal">🪷 丁寧・格式</button>
      <button class="r-tab" id="rt-warm">🌸 温かみ重視</button>
      <button class="r-tab" id="rt-casual">☕ カジュアル</button>
    </div>
    <div class="r-panel show" id="rp-formal">
      <div class="r-label">丁寧・格式</div>
      <div class="r-text" id="rx-formal"></div>
      <button class="copy-btn" id="cp-formal">📋 コピーする</button>
    </div>
    <div class="r-panel" id="rp-warm">
      <div class="r-label">温かみ重視</div>
      <div class="r-text" id="rx-warm"></div>
      <button class="copy-btn" id="cp-warm">📋 コピーする</button>
    </div>
    <div class="r-panel" id="rp-casual">
      <div class="r-label">カジュアル</div>
      <div class="r-text" id="rx-casual"></div>
      <button class="copy-btn" id="cp-casual">📋 コピーする</button>
    </div>
  </div>
</div>

<footer>🌿 お礼文ジェネレーター by <a href="https://anjerika129.github.io">亜矢プロジェクト</a></footer>
</div>
<div class="toast" id="toast"></div>

<script>
var curScene = 'concert';
var curTone = 'formal';
var texts = {formal:'', warm:'', casual:''};
var scenes = ['concert','lesson','volunteer','support'];
var tones = ['formal','warm','casual'];

scenes.forEach(function(s) {
  document.getElementById('s-' + s).addEventListener('click', function() {
    scenes.forEach(function(x){ document.getElementById('s-' + x).classList.remove('on'); });
    this.classList.add('on');
    curScene = s;
  });
});

tones.forEach(function(t) {
  document.getElementById('t-' + t).addEventListener('click', function() {
    tones.forEach(function(x){ document.getElementById('t-' + x).classList.remove('on'); });
    this.classList.add('on');
    curTone = t;
  });
  document.getElementById('rt-' + t).addEventListener('click', function() {
    tones.forEach(function(x){
      document.getElementById('rt-' + x).classList.remove('on');
      document.getElementById('rp-' + x).classList.remove('show');
    });
    this.classList.add('on');
    document.getElementById('rp-' + t).classList.add('show');
  });
  document.getElementById('cp-' + t).addEventListener('click', function() {
    navigator.clipboard.writeText(texts[t]).then(function(){ showToast('📋 コピーしました'); });
  });
});

document.getElementById('genBtn').addEventListener('click', function() {
  var to = document.getElementById('toName').value.trim();
  var ep = document.getElementById('episode').value.trim();

  var T = {
    concert: {
      formal: function(t,e){ return (t ? t+'、' : '')+'この度は演奏会にお越しいただき、誠にありがとうございました。\n\n皆さまのご臨席を賜り、心より感謝申し上げます。'+(e?'\n\n'+e:'')+'\n\n今後とも変わらぬご支援のほど、どうぞよろしくお願い申し上げます。'; },
      warm:   function(t,e){ return (t ? t+'、' : '')+'先日は演奏会にお越しいただき、本当にありがとうございました🌸\n\n皆さまのあたたかい拍手に、演奏中も心が満たされました。'+(e?'\n\n'+e:'')+'\n\nまたいつかお会いできることを楽しみにしております。'; },
      casual: function(t,e){ return (t||'みなさん')+'、先日はありがとうございました！\n\n来てくださって、すごく嬉しかったです☺️'+(e?'\n\n'+e:'')+'\n\nまたぜひ聴きに来てください🎵'; },
    },
    lesson: {
      formal: function(t,e){ return (t||'先生')+'、いつも丁寧なご指導をいただき、誠にありがとうございます。\n\n先生のご指導のおかげで、少しずつ成長を感じることができております。'+(e?'\n\n'+e:'')+'\n\n引き続き、どうぞよろしくお願いいたします。'; },
      warm:   function(t,e){ return (t||'先生')+'、いつも温かくご指導いただき、ありがとうございます🌸\n\nレッスンのたびに新しい発見があり、声楽がますます好きになっています。'+(e?'\n\n'+e:'')+'\n\nこれからもよろしくお願いします。'; },
      casual: function(t,e){ return (t||'先生')+'、今日もありがとうございました！\n\nすごく勉強になりました😊'+(e?'\n\n'+e:'')+'\n\nまた次回もよろしくお願いします🎵'; },
    },
    volunteer: {
      formal: function(t,e){ return (t?t+'の皆さま、':'')+'この度は訪問演奏の機会をいただき、誠にありがとうございました。\n\n皆さまのあたたかいお心遣いに、心より感謝申し上げます。'+(e?'\n\n'+e:'')+'\n\nまたお会いできる日を楽しみにしております。'; },
      warm:   function(t,e){ return (t?t+'の皆さま、':'')+'先日は素敵な時間をありがとうございました🌸\n\n皆さまの笑顔に、私の方こそ元気をいただきました。'+(e?'\n\n'+e:'')+'\n\nまたいつかお伺いできることを願っております。'; },
      casual: function(t,e){ return (t||'皆さん')+'、先日はありがとうございました！\n\n笑顔で聴いてくださって、とっても嬉しかったです☺️'+(e?'\n\n'+e:'')+'\n\nまたぜひ伺います🎵'; },
    },
    support: {
      formal: function(t,e){ return (t?t+'、':'')+'この度はご支援いただき、誠にありがとうございました。\n\n皆さまのお力添えのおかげで、無事に活動を続けることができております。'+(e?'\n\n'+e:'')+'\n\n今後とも何卒よろしくお願い申し上げます。'; },
      warm:   function(t,e){ return (t?t+'、':'')+'いつも応援してくださり、本当にありがとうございます🌸\n\n皆さまの存在が、私の大きな励みになっています。'+(e?'\n\n'+e:'')+'\n\nこれからも頑張っていきますので、どうぞよろしくお願いします。'; },
      casual: function(t,e){ return (t||'みなさん')+'、いつもありがとう！\n\n応援してもらえてとっても嬉しいです😊'+(e?'\n\n'+e:'')+'\n\nこれからもよろしくね🎵'; },
    },
  };

  tones.forEach(function(t) {
    texts[t] = T[curScene][t](to, ep);
    document.getElementById('rx-' + t).textContent = texts[t];
  });

  tones.forEach(function(t) {
    document.getElementById('rt-' + t).classList.remove('on');
    document.getElementById('rp-' + t).classList.remove('show');
  });
  document.getElementById('rt-' + curTone).classList.add('on');
  document.getElementById('rp-' + curTone).classList.add('show');

  var box = document.getElementById('resultBox');
  box.classList.add('show');
  box.scrollIntoView({behavior:'smooth', block:'start'});
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
