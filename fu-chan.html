<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふーちゃんアプリ 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;
  background:linear-gradient(160deg,#e8f4ff 0%,#f0f0ff 50%,#e8fff5 100%);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem 4rem;
  color:#1a1a2e;
}
.app{
  max-width:440px;width:100%;
  background:#ffffff;
  border-radius:28px;
  padding:1.5rem 1.25rem 2.5rem;
  box-shadow:0 12px 48px rgba(80,60,180,0.12),0 2px 8px rgba(0,0,0,0.06);
  position:relative;overflow:hidden;
}
.app::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(93,202,165,0.07);pointer-events:none;
}
.header{text-align:center;padding:0.5rem 0 0.25rem;position:relative;}
.name-tag{font-size:11px;letter-spacing:0.14em;color:#888;margin-top:4px;text-transform:uppercase;}

/* 吹き出し */
.bubble{
  background:#fff;border:1px solid #e0dff8;border-radius:18px;
  padding:1rem 1.25rem;margin:0.75rem 0;min-height:82px;
  font-size:14px;line-height:1.85;color:#1a1a2e;position:relative;
  transition:all 0.2s;
}
.bubble::after{content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#e0dff8;}
.bubble::before{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);z-index:1;border:5px solid transparent;border-top-color:#fff;}
.sub{font-size:12.5px;color:#888;}

/* ひとこと */
.kotoba-badge{
  background:linear-gradient(135deg,#eeedfe,#e1f5ee);
  border:1px solid #afa9ec;border-radius:12px;
  padding:8px 14px;margin:0 0 10px;
  font-size:12px;color:#534ab7;line-height:1.6;
  text-align:center;cursor:pointer;transition:opacity 0.15s;
}
.kotoba-badge:hover{opacity:0.8;}
.kotoba-sub{font-size:10px;color:#888;display:block;margin-top:2px;}

/* タブ */
.mode-tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:0.85rem 0 0.5rem;}
.tab-btn{
  border:1px solid #ddd;background:#f8f8f8;border-radius:20px;
  padding:6px 13px;font-size:12px;cursor:pointer;color:#666;
  transition:all 0.15s;font-family:inherit;
}
.tab-btn:hover{background:#efefef;}
.tab-btn.active{background:#e1f5ee;border-color:#5dcaa5;color:#0f6e56;font-weight:700;}
.tab-btn.tarot-tab.active{background:#eeedfe;border-color:#afa9ec;color:#3c3489;}
.tab-btn.shindan-tab.active{background:#fff0f5;border-color:#f4b8c5;color:#72243e;}
.tab-btn.kotoba-tab.active{background:#fffbe6;border-color:#fac775;color:#633806;}

/* グリッド */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0.5rem 0;}
.act-btn{
  border:1px solid #e8e8e8;background:#fff;border-radius:14px;
  padding:12px 10px;font-size:13px;cursor:pointer;color:#1a1a2e;
  text-align:center;transition:all 0.15s;font-family:inherit;
}
.act-btn:hover{background:#f8f8f8;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.act-btn:active{transform:scale(0.97);}
.btn-icon{font-size:22px;display:block;margin-bottom:5px;}

/* クイズ */
.answer-area{margin-top:0.5rem;}
.answer-input{
  width:100%;border:1px solid #ddd;border-radius:10px;
  padding:9px 13px;font-size:14px;font-family:inherit;
  background:#fff;color:#1a1a2e;margin-bottom:7px;
  outline:none;transition:border-color 0.15s;
}
.answer-input:focus{border-color:#5dcaa5;}
.submit-btn{
  width:100%;background:#e1f5ee;border:1px solid #5dcaa5;border-radius:10px;
  padding:10px;font-size:14px;color:#0f6e56;cursor:pointer;font-weight:700;
  font-family:inherit;transition:background 0.15s;
}
.submit-btn:hover{background:#c0eedc;}
.next-btn{
  width:100%;background:#f8f8f8;border:1px solid #ddd;border-radius:10px;
  padding:9px;font-size:13px;color:#666;cursor:pointer;margin-top:7px;font-family:inherit;
}
.next-btn:hover{background:#efefef;}
.result-badge{display:inline-block;padding:3px 12px;border-radius:10px;font-size:12px;font-weight:700;margin-top:6px;}
.badge-ok{background:#eaf3de;color:#3b6d11;border:1px solid #97c459;}
.badge-ng{background:#fcebeb;color:#a32d2d;border:1px solid #f09595;}

/* タロット */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.theme-btn{
  border:1px solid #ddd;background:#fff;border-radius:14px;
  padding:11px 8px;font-size:13px;cursor:pointer;color:#1a1a2e;
  text-align:center;transition:all 0.15s;font-family:inherit;
}
.theme-btn:hover{background:#f5f5ff;transform:translateY(-1px);}
.theme-btn.selected{background:#eeedfe;border-color:#afa9ec;color:#3c3489;font-weight:700;}
.draw-btn{
  width:100%;background:linear-gradient(135deg,#534ab7,#7f77dd);border:none;border-radius:12px;
  padding:13px;font-size:15px;color:white;cursor:pointer;font-weight:700;
  letter-spacing:0.05em;margin-top:4px;font-family:inherit;transition:opacity 0.15s,transform 0.1s;
}
.draw-btn:hover{opacity:0.88;transform:translateY(-1px);}
.draw-btn:active{transform:scale(0.98);}
.draw-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.card-scene{perspective:600px;display:flex;justify-content:center;margin:14px 0;}
.tarot-card{
  width:94px;height:148px;border-radius:12px;
  transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(.4,0,.2,1);position:relative;
}
.tarot-card.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;width:100%;height:100%;border-radius:11px;
  backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:8px;
}
.card-back{background:linear-gradient(135deg,#1a1040,#2d1b69);border:2px solid #534ab7;}
.card-front{background:#fdfbff;border:2px solid #afa9ec;transform:rotateY(180deg);}
.card-emoji{font-size:30px;}
.card-name{font-size:10px;color:#534ab7;font-weight:700;text-align:center;line-height:1.3;margin-top:5px;}
.card-rev{font-size:9px;color:#a32d2d;margin-top:2px;font-weight:700;}
.result-box{
  background:#fff;border:1px solid #d0ceee;border-radius:16px;
  padding:1rem 1.2rem;width:100%;margin-top:4px;
}
.result-label{font-size:12px;color:#534ab7;font-weight:700;margin-bottom:7px;letter-spacing:0.04em;}
.result-text{font-size:13.5px;line-height:1.85;color:#1a1a2e;}
.star-deco{color:#afa9ec;font-size:14px;letter-spacing:4px;text-align:center;margin:4px 0;}
.again-btn{
  width:100%;background:#eeedfe;border:1px solid #afa9ec;border-radius:10px;
  padding:10px;font-size:14px;color:#3c3489;cursor:pointer;font-weight:700;
  margin-top:10px;font-family:inherit;transition:background 0.15s;
}
.again-btn:hover{background:#cecbf6;}

/* 診断 */
.shindan-q{
  background:#fff0f5;border:1px solid #f4b8c5;border-radius:14px;
  padding:12px 14px;margin-bottom:10px;font-size:14px;line-height:1.7;
  color:#1a1a2e;
}
.shindan-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.shindan-opt{
  border:1px solid #f4b8c5;background:#fff;border-radius:10px;
  padding:10px 14px;font-size:13px;cursor:pointer;color:#1a1a2e;
  text-align:left;font-family:inherit;transition:all 0.15s;
}
.shindan-opt:hover{background:#fff0f5;transform:translateX(3px);}
.shindan-result{
  background:#fff0f5;border:1px solid #f4b8c5;border-radius:14px;
  padding:14px;text-align:center;
}
.shindan-score{font-size:28px;font-weight:700;color:#d4537e;margin:8px 0 4px;}
.shindan-comment{font-size:13px;line-height:1.7;color:#1a1a2e;}

/* 今日のひとこと専用 */
.kotoba-card{
  background:linear-gradient(135deg,#fdfbff,#f5f5ff);
  border:1px solid #d0ceee;border-radius:18px;
  padding:1.4rem 1.2rem;text-align:center;margin-bottom:10px;
}
.kotoba-main{font-size:15px;line-height:1.9;color:#1a1a2e;margin-bottom:8px;}
.kotoba-from{font-size:11px;color:#888;letter-spacing:0.08em;}
.kotoba-refresh{
  width:100%;background:#eeedfe;border:1px solid #afa9ec;border-radius:10px;
  padding:9px;font-size:13px;color:#3c3489;cursor:pointer;font-weight:700;
  font-family:inherit;transition:background 0.15s;
}
.kotoba-refresh:hover{background:#cecbf6;}

@media(max-width:480px){
  body{padding:0.5rem 0.25rem 2rem;}
  .app{border-radius:16px;padding:1rem 0.9rem 2rem;}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <svg width="130" height="140" viewBox="0 0 140 148" xmlns="http://www.w3.org/2000/svg">

      <text x="108" y="108" font-size="12" fill="#3DAA85" opacity="0.7">♪</text>
    </svg>
    <p class="name-tag">🎵 Fu-chan · フルーティスト</p>
  </div>

  <div class="kotoba-badge" id="kotobaBadge" onclick="refreshKotoba()">
    <span id="kotobaBadgeText">読み込み中...</span>
    <span class="kotoba-sub">💭 タップで変わります</span>
  </div>

  <div class="bubble" id="bubble">
    どうも〜！ふーちゃんです。<br>
    フルーティストです。<br>
    <span class="sub">（横向きの楽器を持ってる人です）</span>

  <div class="mode-tabs">
    <button class="tab-btn active" onclick="setMode('hello')">あいさつ</button>
    <button class="tab-btn" onclick="setMode('walk')">さんぽ</button>

    <button class="tab-btn" onclick="setMode('joke')">ふふっ</button>
    <button class="tab-btn tarot-tab" onclick="setMode('tarot')">✨タロット</button>
    <button class="tab-btn shindan-tab" onclick="setMode('shindan')">🎯診断</button>

<script>
const bubble = document.getElementById('bubble');
const actionArea = document.getElementById('action-area');

const moods = {
  happy:    { mouth:"M 57 75 Q 68 82 79 75", bl:"M48 51 Q54 48 60 50", br:"M76 51 Q82 48 88 50" },
  laugh:    { mouth:"M 55 74 Q 68 85 81 74", bl:"M48 50 Q54 47 60 49", br:"M76 50 Q82 47 88 49" },
  think:    { mouth:"M 60 77 Q 68 79 76 77", bl:"M48 50 Q54 49 60 51", br:"M76 50 Q82 49 88 51" },
  surprise: { mouth:"M 63 75 Q 68 80 73 75", bl:"M47 50 Q54 45 60 48", br:"M76 50 Q82 45 88 48" },
  mystical: { mouth:"M 59 76 Q 68 81 77 76", bl:"M47 49 Q54 46 60 49", br:"M75 49 Q82 46 88 49" },
  proud:    { mouth:"M 58 74 Q 68 80 78 74", bl:"M47 48 Q54 45 61 48", br:"M75 48 Q82 45 89 48" },
};
function setMood(m) {
  const mo = moods[m] || moods.happy;
  document.getElementById('mo').setAttribute('d', mo.mouth);
  document.getElementById('bL').setAttribute('d', mo.bl);
  document.getElementById('bR').setAttribute('d', mo.br);
}
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ===== 今日のひとこと（バッジ用） =====
const kotobaMini = [
  "フルートは横向き。人生も横から見ると違う景色がある。知らんけど。",
  "音が出ない日は、息の日。（意味は自分で考えて）",
  "練習しない日も、フルートは待っている。けなげだと思う。",
  "アンブシュアを制する者は、フルートを制する。たぶん。",
  "休符も音楽。サボりも…ちょっと違う。",
  "今日吹かなかった分は、明日の感動になる。（なるといいね）",
  "フルートは3つに分解できる。人間は分解できない。フルートの方が便利。",
  "高い音は難しい。でも難しいから面白い。（面白くない日もある）",
  "笛と言われても、もう怒らない。（ちょっと怒ってる）",
  "ピッチが合う瞬間は、宇宙と同期している感じがする。大げさかもしれない。",
  "フルートのケースを持って歩くと、なんかプロっぽい。中身は関係ない。",
  "息が大事。生きるのも息が大事。フルートと人間、意外と同じ。",
];
let kotobaMiniIdx = Math.floor(Math.random() * kotobaMini.length);
function refreshKotoba() {
  kotobaMiniIdx = (kotobaMiniIdx + 1) % kotobaMini.length;
  document.getElementById('kotobaBadgeText').textContent = kotobaMini[kotobaMiniIdx];
}
document.getElementById('kotobaBadgeText').textContent = kotobaMini[kotobaMiniIdx];

// ===== データ =====
const helloData = [
  { label:"おはよう", icon:"☀️", text:'おはようございます。<br>朝から口の形の練習してたら<br>家族に「なに？」って言われました。<br><span class="sub">（アンブシュア練習です、説明難しい）</span>', mood:"think" },
  { label:"こんにちは", icon:"🌤️", text:'こんにちは〜！<br>今日もフルート吹きました。<br>音が出るまで3分かかりました。<br><span class="sub">（毎日やってるのに毎日かかる）</span>', mood:"happy" },
  { label:"こんばんは", icon:"🌙", text:'こんばんは。<br>夜に吹いたら隣の方に<br>「笛の音がする」と言われました。<br><span class="sub">フルートです。笛ではない。（笛です）</span>', mood:"think" },
  { label:"またね！", icon:"👋", text:'またね〜！<br>次来るときも吹いてます。<br>上手くなってるかも。<br><span class="sub">（なってない可能性もある）</span>', mood:"laugh" },
  { label:"元気？", icon:"💚", text:'元気です！<br>フルートのせいで元気です。<br>フルートがなくても元気です。<br><span class="sub">（でもフルートがあった方が元気です）</span>', mood:"happy" },
  { label:"ありがとう", icon:"🙏", text:'ありがとうございます。<br>その言葉、フルートに伝えておきます。<br>フルートも喜ぶと思います。<br><span class="sub">（喜ぶかどうかは不明）</span>', mood:"laugh" },
];

const walkData = [
  { label:"公園へ", icon:"🌳", text:'公園に来ました。<br>風が気持ちいい〜。<br>フルートが勝手に鳴りそう。<br><span class="sub">（鳴りません、ちゃんと吹かないと）</span>', mood:"think" },
  { label:"海沿い", icon:"🌊", text:'海沿いを歩いてます。<br>潮風でフルートが塩辛くなりそう。<br>大事な楽器なので想像だけにした。<br><span class="sub">（持ってきてない。正解）</span>', mood:"laugh" },
  { label:"商店街", icon:"🏮", text:'商店街でクレープ食べました。<br>美味しかった。<br>でも口のまわりがベタベタになって<br><span class="sub">アンブシュアが崩れた（本末転倒）</span>', mood:"surprise" },
  { label:"帰り道", icon:"🏠", text:'ただいま〜。<br>たくさん歩いた。息が上がった。<br>でもフルートは息が大事。<br><span class="sub">（つまりいい練習になった、と思う）</span>', mood:"happy" },
  { label:"坂道", icon:"⛰️", text:'坂道を登りました。<br>息が切れました。<br>フルートは息が命なのに。<br><span class="sub">（完全に逆効果。でも景色は良かった）</span>', mood:"think" },
  { label:"カフェ", icon:"☕", text:'カフェに入りました。<br>BGMがクラシックでした。<br>フルートの音が聞こえた気がしました。<br><span class="sub">（気のせいでした。ピアノでした）</span>', mood:"laugh" },
  { label:"図書館", icon:"📚", text:'図書館に来ました。<br>フルートの楽譜を探しました。<br>たくさんありました。<br><span class="sub">（全部難しそうでした。そっと棚に戻した）</span>', mood:"surprise" },
  { label:"夜の散歩", icon:"🌟", text:'星が綺麗です。<br>フルートの音みたいに澄んでる。<br>…と言いたいところですが<br><span class="sub">今の自分の音は曇ってます。正直に言います。</span>', mood:"think" },
];

function renderGrid(data, onClickFn) {
  const g = document.createElement('div'); g.className = 'grid';
  data.forEach(d => {
    const b = document.createElement('button'); b.className = 'act-btn';
    b.innerHTML = `<span class="btn-icon">${d.icon}</span>${d.label}`;
    b.onclick = () => onClickFn(d); g.appendChild(b);
  });
  actionArea.appendChild(g);
}

function renderQuiz() {
  const q = quizData[Math.floor(Math.random() * quizData.length)];
  bubble.innerHTML = q.q; setMood('think');
  const area = document.createElement('div'); area.className = 'answer-area';
  const inp = document.createElement('input'); inp.className = 'answer-input';
  inp.placeholder = 'こたえを入力してね'; inp.type = 'text';
  const btn = document.createElement('button'); btn.className = 'submit-btn'; btn.textContent = 'こたえる！';
  const badge = document.createElement('span'); badge.className = 'result-badge'; badge.style.display = 'none';
  let answered = false;
  btn.onclick = () => {
    if (answered) return; const val = inp.value.trim(); if (!val) return; answered = true;
    const ok = q.a.some(a => val.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(val.toLowerCase()));
    bubble.innerHTML = ok ? q.ok : q.ng;
    badge.textContent = ok ? '正解！！' : 'ざんねん...';
    badge.className = 'result-badge ' + (ok ? 'badge-ok' : 'badge-ng');
    badge.style.display = 'inline-block'; setMood(ok ? 'laugh' : 'think');
    const nb = document.createElement('button'); nb.className = 'next-btn'; nb.textContent = 'つぎのもんだい！';
    nb.onclick = () => setMode('quiz'); area.appendChild(nb);
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  area.appendChild(inp); area.appendChild(btn); area.appendChild(badge);
  actionArea.appendChild(area);
}

    const scene = document.createElement('div'); scene.className = 'card-scene';
    const cardEl = document.createElement('div'); cardEl.className = 'tarot-card';
    cardEl.innerHTML = `<div class="card-face card-back"><div style="font-size:26px;color:#afa9ec;">✦</div><div style="font-size:9px;color:#7f77dd;margin-top:8px;letter-spacing:0.12em;">TAROT</div></div><div class="card-face card-front"><div class="card-emoji">${card.emoji}</div><div class="card-name">${card.name}</div>${rev?'<div class="card-rev">逆位置</div>':''}</div>`;
    scene.appendChild(cardEl);
    sec.appendChild(scene);
    const rbox = document.createElement('div'); rbox.className = 'result-box';
    rbox.innerHTML = '<div class="result-label" style="color:#aaa;">読み込み中...</div>';
    sec.appendChild(rbox);
    setTimeout(() => {
      cardEl.classList.add('flipped');
      bubble.innerHTML = `${card.emoji} ${card.name}のカードが出たよ！<br><span class="sub">フルートの音色に乗せてお届け♪</span>`;
      setTimeout(() => {
        let text = rand(card[selectedTheme.key] || card.lucky);
        if (rev) text = rand(reversedPre) + 'エネルギーが内向きになってる。' + text.replace(/。$/, '。でも方向を変えれば大丈夫。');
        rbox.innerHTML = `<div class="star-deco">✦ ✦ ✦</div><div class="result-label">🃏 ${card.name}（${posStr}）— ${selectedTheme.label}</div><div class="result-text">${text}</div>`;
        const ag = document.createElement('button'); ag.className = 'again-btn'; ag.textContent = 'もう一度引く ✨';
        ag.onclick = () => setMode('tarot'); sec.appendChild(ag); setMood('happy');
      }, 400);
    }, 900);
  };
  sec.appendChild(tg); sec.appendChild(drawBtn);
  actionArea.appendChild(sec);
}

function renderShindan() {
  setMood('think');
  const q = shindanData[Math.floor(Math.random() * shindanData.length)];
  bubble.innerHTML = `🎯 フルート適性診断<br><span class="sub">どう答えても向いてます（予告）</span>`;
  const wrap = document.createElement('div');
  const qEl = document.createElement('div'); qEl.className = 'shindan-q'; qEl.textContent = q.q;
  wrap.appendChild(qEl);
  const opts = document.createElement('div'); opts.className = 'shindan-opts';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button'); b.className = 'shindan-opt'; b.textContent = o;
    b.onclick = () => {
      opts.querySelectorAll('.shindan-opt').forEach(x => { x.disabled = true; x.style.opacity = '0.5'; });
      b.style.opacity = '1'; b.style.background = '#fff0f5'; b.style.borderColor = '#d4537e';
      const res = document.createElement('div'); res.className = 'shindan-result';
      const score = document.createElement('div'); score.className = 'shindan-score';
      score.textContent = rand(shindanResults).split('\n')[0].replace('フルート適性：', '');
      const comment = document.createElement('div'); comment.className = 'shindan-comment';
      comment.textContent = q.comments[i];
      const conclusion = document.createElement('div');
      conclusion.style.cssText = 'margin-top:10px;font-size:13px;color:#534ab7;font-weight:700;';
      conclusion.textContent = '→ 結論：向いてます。（どう答えても）';
      res.appendChild(score); res.appendChild(comment); res.appendChild(conclusion);
      wrap.appendChild(res);
      setMood('proud');
      bubble.innerHTML = `診断完了！<br>あなたはフルートに向いてます。<br><span class="sub">（これは毎回同じ結論です）</span>`;
      const again = document.createElement('button'); again.className = 'next-btn'; again.textContent = '別の診断をする';
      again.onclick = () => setMode('shindan'); again.style.marginTop = '8px';
      wrap.appendChild(again);
    };
    opts.appendChild(b);
  });
  wrap.appendChild(opts);
  actionArea.appendChild(wrap);
}

function renderKotoba() {
  setMood('mystical');
  bubble.innerHTML = '今日のひとこと🎵<br><span class="sub">フルートから学ぶ人生の知恵（知らんけど）</span>';
  const k = kotobaFull[kotobaIdx % kotobaFull.length];
  const card = document.createElement('div'); card.className = 'kotoba-card';
  const main = document.createElement('div'); main.className = 'kotoba-main';
  main.style.whiteSpace = 'pre-line'; main.textContent = k.text;
  const from = document.createElement('div'); from.className = 'kotoba-from';
  from.textContent = '— ' + k.from;
  card.appendChild(main); card.appendChild(from);
  actionArea.appendChild(card);
  const btn = document.createElement('button'); btn.className = 'kotoba-refresh';
  btn.textContent = '次のひとこと 🎵';
  btn.onclick = () => {
    kotobaIdx++;
    refreshKotoba();
    setMode('kotoba');
  };
  actionArea.appendChild(btn);
}

function setMode(mode) {
  actionArea.innerHTML = '';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + mode + "'")) b.classList.add('active');
  });
  const intros = {
    hello:'どうも〜ふーちゃんです。<br>挨拶は大事。フルートより大事かも。<br><span class="sub">（フルートに怒られそう）</span>',
    walk:'お散歩行こう！<br>フルートは置いてきます。<br><span class="sub">（外で吹くと何かと大変なので）</span>',
    quiz:'フルートクイズだよ〜！<br>全問正解したらすごい。<br><span class="sub">ふーちゃんより詳しいかもしれない。</span>',
    joke:'笑えるかは保証できないけど<br>全部実話ベースです。<br><span class="sub">（フルート人生、なかなか波乱）</span>',
  };
  if (mode !== 'tarot' && mode !== 'shindan' && mode !== 'kotoba') {
    bubble.innerHTML = intros[mode] || ''; setMood('happy');
  }
  if (mode === 'hello') renderGrid(helloData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'walk') renderGrid(walkData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'quiz') renderQuiz();
  else if (mode === 'joke') renderGrid(jokeData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'tarot') renderTarot();
  else if (mode === 'shindan') renderShindan();
  else if (mode === 'kotoba') renderKotoba();
}

setMood('happy');
</script>
</body>
</html>
