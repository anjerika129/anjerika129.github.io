<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふーちゃんアプリ 🎵</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem 3rem;
    color: #1a1a2e;
  }

  .app {
    max-width: 440px;
    width: 100%;
    background: #ffffff;
    border-radius: 24px;
    padding: 1.5rem 1.25rem 2.5rem;
    box-shadow: 0 8px 40px rgba(80,60,180,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  .header { text-align: center; padding: 0.5rem 0 0.25rem; }

  .name-tag {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: #888;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .bubble {
    background: #fff;
    border: 1px solid #e0dff8;
    border-radius: 18px;
    padding: 1rem 1.25rem;
    margin: 0.75rem 0;
    min-height: 82px;
    font-size: 14px;
    line-height: 1.85;
    color: #1a1a2e;
    position: relative;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -11px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #e0dff8;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    border: 5px solid transparent;
    border-top-color: #fff;
  }

  .sub { font-size: 12.5px; color: #888; }

  .mode-tabs {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0.85rem 0 0.5rem;
  }
  .tab-btn {
    border: 1px solid #ddd;
    background: #f8f8f8;
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 12px;
    cursor: pointer;
    color: #666;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { background: #efefef; }
  .tab-btn.active { background: #e1f5ee; border-color: #5dcaa5; color: #0f6e56; font-weight: 600; }
  .tab-btn.tarot-tab.active { background: #eeedfe; border-color: #afa9ec; color: #3c3489; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0.5rem 0; }

  .act-btn {
    border: 1px solid #e8e8e8;
    background: #fff;
    border-radius: 14px;
    padding: 12px 10px;
    font-size: 13px;
    cursor: pointer;
    color: #1a1a2e;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .act-btn:hover { background: #f8f8f8; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .act-btn:active { transform: scale(0.97); }
  .btn-icon { font-size: 22px; display: block; margin-bottom: 5px; }

  .answer-area { margin-top: 0.5rem; }
  .answer-input {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 9px 13px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: #1a1a2e;
    margin-bottom: 7px;
    outline: none;
    transition: border-color 0.15s;
  }
  .answer-input:focus { border-color: #5dcaa5; }

  .submit-btn {
    width: 100%;
    background: #e1f5ee;
    border: 1px solid #5dcaa5;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    color: #0f6e56;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #c0eedc; }

  .next-btn {
    width: 100%;
    background: #f8f8f8;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 9px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    margin-top: 7px;
    font-family: inherit;
  }
  .next-btn:hover { background: #efefef; }

  .result-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
  }
  .badge-ok { background: #eaf3de; color: #3b6d11; border: 1px solid #97c459; }
  .badge-ng { background: #fcebeb; color: #a32d2d; border: 1px solid #f09595; }

  /* タロット */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .theme-btn {
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 14px;
    padding: 11px 8px;
    font-size: 13px;
    cursor: pointer;
    color: #1a1a2e;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .theme-btn:hover { background: #f5f5ff; transform: translateY(-1px); }
  .theme-btn.selected { background: #eeedfe; border-color: #afa9ec; color: #3c3489; font-weight: 600; }

  .draw-btn {
    width: 100%;
    background: linear-gradient(135deg, #534ab7, #7f77dd);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 15px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-top: 4px;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
  }
  .draw-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .draw-btn:active { transform: scale(0.98); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .card-scene { perspective: 600px; display: flex; justify-content: center; margin: 14px 0; }
  .tarot-card {
    width: 94px;
    height: 148px;
    border-radius: 12px;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .tarot-card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 11px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }
  .card-back { background: linear-gradient(135deg, #1a1040, #2d1b69); border: 2px solid #534ab7; }
  .card-front { background: #fdfbff; border: 2px solid #afa9ec; transform: rotateY(180deg); }
  .card-emoji { font-size: 30px; }
  .card-name { font-size: 10px; color: #534ab7; font-weight: 600; text-align: center; line-height: 1.3; margin-top: 5px; }
  .card-rev { font-size: 9px; color: #a32d2d; margin-top: 2px; font-weight: 600; }

  .result-box {
    background: #fff;
    border: 1px solid #d0ceee;
    border-radius: 16px;
    padding: 1rem 1.2rem;
    width: 100%;
    margin-top: 4px;
  }
  .result-label { font-size: 12px; color: #534ab7; font-weight: 600; margin-bottom: 7px; letter-spacing: 0.04em; }
  .result-text { font-size: 13.5px; line-height: 1.85; color: #1a1a2e; }
  .star-deco { color: #afa9ec; font-size: 14px; letter-spacing: 4px; text-align: center; margin: 4px 0; }

  .again-btn {
    width: 100%;
    background: #eeedfe;
    border: 1px solid #afa9ec;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    color: #3c3489;
    cursor: pointer;
    font-weight: 600;
    margin-top: 10px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .again-btn:hover { background: #cecbf6; }

  @media (max-width: 480px) {
    body { padding: 0.5rem 0.25rem 2rem; }
    .app { border-radius: 16px; padding: 1rem 0.9rem 2rem; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <svg width="130" height="140" viewBox="0 0 140 148" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sk" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#FFE8D5"/>
          <stop offset="100%" stop-color="#FFCCA8"/>
        </radialGradient>
      </defs>
      <ellipse cx="68" cy="52" rx="35" ry="37" fill="#1A3A5C"/>
      <ellipse cx="68" cy="60" rx="30" ry="32" fill="url(#sk)"/>
      <ellipse cx="68" cy="36" rx="33" ry="16" fill="#1E4A72"/>

      <path d="M38 54 Q34 38 40 34 Q36 48 38 58" fill="#2A5A8A"/>
      <path d="M98 54 Q102 38 96 34 Q100 48 98 58" fill="#2A5A8A"/>

      <ellipse cx="98" cy="62" rx="4.5" ry="5.5" fill="#FFCCA8"/>
      <ellipse cx="54" cy="59" rx="6" ry="6.5" fill="white"/>
      <ellipse cx="82" cy="59" rx="6" ry="6.5" fill="white"/>
      <circle cx="54" cy="60" r="4.2" fill="#1A3A5C" id="eL"/>
      <circle cx="82" cy="60" r="4.2" fill="#1A3A5C" id="eR"/>
      <circle cx="55.4" cy="58.5" r="1.5" fill="white"/>
      <circle cx="83.4" cy="58.5" r="1.5" fill="white"/>
      <path d="M48 51 Q54 48 60 50" stroke="#1E4A72" stroke-width="1.5" fill="none" stroke-linecap="round" id="bL"/>
      <path d="M76 51 Q82 48 88 50" stroke="#1E4A72" stroke-width="1.5" fill="none" stroke-linecap="round" id="bR"/>

      <path d="M 57 75 Q 68 82 79 75" stroke="#CC6655" stroke-width="2" fill="none" stroke-linecap="round" id="mo"/>

      <path d="M32 148 Q34 107 47 102 L60 99 L68 104 L76 99 L89 102 Q102 107 104 148Z" fill="#5DCAA5"/>
      <path d="M56 99 Q68 109 80 99" fill="#3DAA85"/>
      <path d="M47 102 Q34 114 28 124" stroke="#FFCCA8" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M89 102 Q106 112 118 118" stroke="#FFCCA8" stroke-width="10" fill="none" stroke-linecap="round"/>
      <g transform="translate(20,118) rotate(-8)">
        <rect x="0" y="-4" width="105" height="8" rx="4" fill="#C8D8E8"/>
        <rect x="2" y="-2" width="101" height="2" rx="1" fill="#E8F4FF" opacity="0.7"/>
        <rect x="0" y="-4.5" width="18" height="9" rx="4.5" fill="#B8C8D8"/>
        <ellipse cx="9" cy="0" rx="5" ry="2.5" fill="#90A8B8"/>
        <ellipse cx="9" cy="0" rx="3" ry="1.5" fill="#607080"/>
        <circle cx="28" cy="0" r="3" fill="#A0B0C0"/>
        <circle cx="44" cy="0" r="3" fill="#A0B0C0"/>
        <circle cx="60" cy="0" r="3" fill="#A0B0C0"/>
        <circle cx="76" cy="0" r="3" fill="#A0B0C0"/>
        <rect x="92" y="-4" width="13" height="8" rx="3" fill="#B8C8D8"/>
      </g>
      <text x="108" y="108" font-size="12" fill="#3DAA85" opacity="0.7">♪</text>
    </svg>
    <p class="name-tag">🎵 Fu-chan · フルーティスト</p>
  </div>

  <div class="bubble" id="bubble">
    どうも〜！ふーちゃんです。<br>
    フルーティストです。<br>
    <span class="sub">（横向きの楽器を持ってる人です）</span>
  </div>

  <div class="mode-tabs">
    <button class="tab-btn active" onclick="setMode('hello')">あいさつ</button>
    <button class="tab-btn" onclick="setMode('walk')">さんぽ</button>
    <button class="tab-btn" onclick="setMode('quiz')">なぞなぞ</button>
    <button class="tab-btn" onclick="setMode('joke')">ふふっ</button>
    <button class="tab-btn tarot-tab" onclick="setMode('tarot')">✨タロット</button>
  </div>

  <div id="action-area"></div>
</div>

<script>
const bubble = document.getElementById('bubble');
const actionArea = document.getElementById('action-area');

const moods = {
  happy:    { mouth:"M 57 75 Q 68 82 79 75", bl:"M48 51 Q54 48 60 50", br:"M76 51 Q82 48 88 50" },
  laugh:    { mouth:"M 55 74 Q 68 85 81 74", bl:"M48 50 Q54 47 60 49", br:"M76 50 Q82 47 88 49" },
  think:    { mouth:"M 60 77 Q 68 79 76 77", bl:"M48 50 Q54 49 60 51", br:"M76 50 Q82 49 88 51" },
  surprise: { mouth:"M 63 75 Q 68 80 73 75", bl:"M47 50 Q54 45 60 48", br:"M76 50 Q82 45 88 48" },
  mystical: { mouth:"M 59 76 Q 68 81 77 76", bl:"M47 49 Q54 46 60 49", br:"M75 49 Q82 46 88 49" },
};
function setMood(m) {
  const mo = moods[m] || moods.happy;
  document.getElementById('mo').setAttribute('d', mo.mouth);
  document.getElementById('bL').setAttribute('d', mo.bl);
  document.getElementById('bR').setAttribute('d', mo.br);
}

const helloData = [
  { label:"おはよう", icon:"☀️", text:'おはようございます。<br>朝から口の形の練習してたら<br>家族に「なに？」って言われました。<br><span class="sub">（アンブシュア練習です、説明難しい）</span>', mood:"think" },
  { label:"こんにちは", icon:"🌤️", text:'こんにちは〜！<br>今日もフルート吹きました。<br>音が出るまで3分かかりました。<br><span class="sub">（毎日やってるのに毎日かかる）</span>', mood:"happy" },
  { label:"こんばんは", icon:"🌙", text:'こんばんは。<br>夜に吹いたら隣の方に<br>「笛の音がする」と言われました。<br><span class="sub">フルートです。笛ではない。（笛です）</span>', mood:"think" },
  { label:"またね！", icon:"👋", text:'またね〜！<br>次来るときも吹いてます。<br>上手くなってるかも。<br><span class="sub">（なってない可能性もある）</span>', mood:"laugh" },
];

const walkData = [
  { label:"公園へ", icon:"🌳", text:'公園に来ました。<br>風が気持ちいい〜。<br>フルートが勝手に鳴りそう。<br><span class="sub">（鳴りません、ちゃんと吹かないと）</span>', mood:"think" },
  { label:"海沿い", icon:"🌊", text:'海沿いを歩いてます。<br>潮風でフルートが塩辛くなりそう。<br>大事な楽器なので想像だけにした。<br><span class="sub">（持ってきてない。正解）</span>', mood:"laugh" },
  { label:"商店街", icon:"🏮", text:'商店街でクレープ食べました。<br>美味しかった。<br>でも口のまわりがベタベタになって<br><span class="sub">アンブシュアが崩れた（本末転倒）</span>', mood:"surprise" },
  { label:"帰り道", icon:"🏠", text:'ただいま〜。<br>たくさん歩いた。息が上がった。<br>でもフルートは息が大事。<br><span class="sub">（つまりいい練習になった、と思う）</span>', mood:"happy" },
];

const quizData = [
  { q:'フルートはどうやって音を出す？<br><span class="sub">ヒント：ふーちゃんの得意なこと</span>', a:["吹く","息","ふく","息を吹く","blow"], ok:'正解〜！！<br>息を吹き込んで音を出します。<br>ただし正しい角度で。<br><span class="sub">最初は音が出なくて泣きました（本当）</span>', ng:'不正解〜！<br>息を吹き込みます。<br>ちなみに弦はないし弓も使わない。<br><span class="sub">それはバイオリンです。全然違う。</span>' },
  { q:'フルートを横向きに構えるのはなぜ？<br>① 見た目がかっこいいから<br>② 音孔に息を当てやすいから<br>③ 作った人の気まぐれ', a:["②","2","音孔","息"], ok:'正解！！<br>音孔に息を正確に当てるためです。<br>でも①も否定はできない。<br><span class="sub">横向きはたしかにかっこいい。</span>', ng:'残念！<br>正解は②音孔に息を当てやすいから。<br>③の「気まぐれ」を選んだ人、<br><span class="sub">ちょっと好きです。</span>' },
  { q:'フルートは何族の楽器？<br>① 弦楽器　② 木管楽器　③ 金管楽器', a:["木管","②","2","もっかん"], ok:'正解！！<br>木管楽器です。<br>金属なのに木管。<br><span class="sub">ふーちゃんも最初「え？」ってなった。</span>', ng:'不正解！<br>木管楽器です。<br>金属なのに木管って変ですよね。<br><span class="sub">音の出し方で決まるらしい。奥深い。</span>' },
  { q:'フルートで一番難しいのは？<br>① 最初の音を出すこと<br>② 指を動かすこと<br>③ 楽譜を読むこと', a:["①","1","最初","音を出す"], ok:'正解！！<br>最初の一音、本当に難しい。<br>ふーちゃんも泣きました（2回目）。<br><span class="sub">でも出た時の感動もひとしおです。</span>', ng:'不正解！<br>正解は①最初の音を出すこと。<br>音が出ない＝ただ息を吐いてる人。<br><span class="sub">ふーちゃんも最初はそうでした（涙）</span>' },
  { q:'フルートの材料で一番高級なのは？<br>① プラスチック　② 銀　③ 金', a:["金","③","3","ゴールド"], ok:'正解！！<br>金（ゴールド）です。<br>もちろんふーちゃんは持ってない。<br><span class="sub">（銀も持ってない。樹脂です、今のところ）</span>', ng:'不正解！<br>一番高いのは金製です。<br>プロ奏者が使う金のフルート、<br><span class="sub">値段を調べて震えたことがあります。</span>' },
];

const jokeData = [
  { label:"フルートあるある", icon:"🎵", text:'フルート吹いてると<br>「笛ですか？」って聞かれる。<br>「フルートです」と言うと<br><span class="sub">「横向きの笛ですね」って返ってくる。（正しい）</span>', mood:"laugh" },
  { label:"練習あるある", icon:"📖", text:'息の練習してると<br>「過呼吸？」って心配される。<br>「フルートの練習です」と言ったら<br><span class="sub">「フルートって息いるの？」って聞かれた。（いります）</span>', mood:"think" },
  { label:"ふーちゃんの秘密", icon:"🎀", text:'フルートの持ち方、<br>慣れるまで腕が疲れました。<br>「なんで横向きなんだ」と思った。<br><span class="sub">今は思いません。かっこいいので。</span>', mood:"laugh" },
  { label:"衝撃の告白", icon:"😮", text:'フルートって分解できるんです。<br>3つに。<br>最初に知った時すごく心配した。<br><span class="sub">「これ元に戻る？」って。戻ります。毎回。</span>', mood:"surprise" },
];

const tarotCards = [
  { name:"愚者", emoji:"🌟", love:["新しい出会いの予感がフルートの第一音みたいにやってくる。怖がらずに吹いてみて。（外れても笑って）","あなたの恋は自由な即興演奏。ルールより感性を信じて。（楽譜なくて大丈夫か？という不安もある）"], work:["新しいことを始めるのに最高のタイミング。失敗しても音が出なかった初日だと思えばいい。","冒険してみて。フルートだって最初は笛と間違えられる。（それでも続けた）"], lucky:["今日は予定外のことが起きそう。でもそれが一番いい音になる日。（準備はしといて）","軽やかに行こう。荷物を持ちすぎない日。フルートのケースだけで十分。"], music:["今まで吹いたことのない曲に挑戦して。最初の一音が全部変える。（音が出なくても続けて）","即興でいい。うまくなくていい。心から出た音が一番きれい。（たぶん）"] },
  { name:"魔術師", emoji:"🪄", love:["あなたには恋を引き寄せる力がある。フルートみたいに、ちゃんと息を吹き込めば音は出る。","今のあなたは最高の状態。好きな人に、今日話しかけてみて。（失敗したらふーちゃんに言って）"], work:["持っているスキルを全部使う時。フルートを3パートに分けて全部吹くくらいの勢いで。（それは無理）","あなたの能力、ちゃんと見てる人がいる。自信を持って。"], lucky:["何をやってもうまくいく波が来てる。フルートで例えると「今日ピッチが合う日」。","集中力が高まってる。やりたいことを今日やって。"], music:["技術が伸びる時期。練習した分だけ確実に返ってくる。（返ってくるのに時間がかかる場合もある）","あなたの音に説得力が出てきた。自分を信じて吹いて。"] },

const reversedPre = ["逆位置だけど大丈夫。", "逆位置か〜。でも心配しないで。", "逆位置ね。まあ聞いて。"];
const tarotThemes = [
  { key:'love', label:'💕 恋愛運' },
  { key:'work', label:'💼 仕事運' },
  { key:'lucky', label:'🍀 全体運' },
  { key:'music', label:'🎵 音楽運' },
];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function renderGrid(data, onClickFn) {
  const g = document.createElement('div'); g.className = 'grid';
  data.forEach(d => {
    const b = document.createElement('button'); b.className = 'act-btn';
    b.innerHTML = `<span class="btn-icon">${d.icon}</span>${d.label}`;
    b.onclick = () => onClickFn(d); g.appendChild(b);
  });
  actionArea.appendChild(g);
}

function renderQuiz() {
  const q = quizData[Math.floor(Math.random() * quizData.length)];
  bubble.innerHTML = q.q; setMood('think');
  const area = document.createElement('div'); area.className = 'answer-area';
  const inp = document.createElement('input'); inp.className = 'answer-input';
  inp.placeholder = 'こたえを入力してね'; inp.type = 'text';
  const btn = document.createElement('button'); btn.className = 'submit-btn'; btn.textContent = 'こたえる！';
  const badge = document.createElement('span'); badge.className = 'result-badge'; badge.style.display = 'none';
  let answered = false;
  btn.onclick = () => {
    if (answered) return; const val = inp.value.trim(); if (!val) return; answered = true;
    const ok = q.a.some(a => val.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(val.toLowerCase()));
    bubble.innerHTML = ok ? q.ok : q.ng;
    badge.textContent = ok ? '正解！！' : 'ざんねん...';
    badge.className = 'result-badge ' + (ok ? 'badge-ok' : 'badge-ng');
    badge.style.display = 'inline-block'; setMood(ok ? 'laugh' : 'think');
    const nb = document.createElement('button'); nb.className = 'next-btn'; nb.textContent = 'つぎのもんだい！';
    nb.onclick = () => setMode('quiz'); area.appendChild(nb);
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  area.appendChild(inp); area.appendChild(btn); area.appendChild(badge);
  actionArea.appendChild(area);
}

function renderTarot() {
  setMood('mystical');
  bubble.innerHTML = 'フルートの音色にのせて<br>カードを引いてみて♪<br><span class="sub">（当たっても外れても責任は取れません）</span>';
  let selectedTheme = null;
  const sec = document.createElement('div');
  const tg = document.createElement('div'); tg.className = 'theme-grid';
  tarotThemes.forEach(t => {
    const b = document.createElement('button'); b.className = 'theme-btn'; b.textContent = t.label;
    b.onclick = () => {
      document.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected'); selectedTheme = t; drawBtn.disabled = false;
    }; tg.appendChild(b);
  });
  const drawBtn = document.createElement('button');
  drawBtn.className = 'draw-btn'; drawBtn.textContent = '✨ カードを引く'; drawBtn.disabled = true;
  drawBtn.onclick = () => {
    drawBtn.disabled = true;
    document.querySelectorAll('.theme-btn').forEach(x => x.disabled = true);
    const card = rand(tarotCards);
    const rev = Math.random() < 0.35;
    const posStr = rev ? '逆位置' : '正位置';
    bubble.innerHTML = 'カードを引いてる...<br><span class="sub">（フルートの音が鳴り響いています）</span>';
    const scene = document.createElement('div'); scene.className = 'card-scene';
    const cardEl = document.createElement('div'); cardEl.className = 'tarot-card';
    cardEl.innerHTML = `<div class="card-face card-back"><div style="font-size:26px;color:#afa9ec;">✦</div><div style="font-size:9px;color:#7f77dd;margin-top:8px;letter-spacing:0.12em;">TAROT</div></div><div class="card-face card-front"><div class="card-emoji">${card.emoji}</div><div class="card-name">${card.name}</div>${rev ? '<div class="card-rev">逆位置</div>' : ''}</div>`;
    scene.appendChild(cardEl);
    sec.appendChild(scene);
    const rbox = document.createElement('div'); rbox.className = 'result-box';
    rbox.innerHTML = '<div class="result-label" style="color:#aaa;">読み込み中...</div>';
    sec.appendChild(rbox);
    setTimeout(() => {
      cardEl.classList.add('flipped');
      bubble.innerHTML = `${card.emoji} ${card.name}のカードが出たよ！<br><span class="sub">フルートの音色に乗せてお届け♪</span>`;
      setTimeout(() => {
        let text = rand(card[selectedTheme.key] || card.lucky);
        if (rev) text = rand(reversedPre) + 'エネルギーが内向きになってる。' + text.replace(/。$/, '。でも方向を変えれば大丈夫。');
        rbox.innerHTML = `<div class="star-deco">✦ ✦ ✦</div><div class="result-label">🃏 ${card.name}（${posStr}）— ${selectedTheme.label}</div><div class="result-text">${text}</div>`;
        const ag = document.createElement('button'); ag.className = 'again-btn'; ag.textContent = 'もう一度引く ✨';
        ag.onclick = () => setMode('tarot'); sec.appendChild(ag); setMood('happy');
      }, 400);
    }, 900);
  };
  sec.appendChild(tg); sec.appendChild(drawBtn);
  actionArea.appendChild(sec);
}

function setMode(mode) {
  actionArea.innerHTML = '';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    if (b.getAttribute('onclick').includes("'" + mode + "'")) b.classList.add('active');
  });
  const intros = {
    hello: 'どうも〜ふーちゃんです。<br>挨拶は大事。フルートより大事かも。<br><span class="sub">（フルートに怒られそう）</span>',
    walk:  'お散歩行こう！<br>フルートは置いてきます。<br><span class="sub">（外で吹くと何かと大変なので）</span>',
    quiz:  'フルートクイズだよ〜！<br>全問正解したらすごい。<br><span class="sub">ふーちゃんより詳しいかもしれない。</span>',
    joke:  '笑えるかは保証できないけど<br>全部実話ベースです。<br><span class="sub">（フルート人生、なかなか波乱）</span>',
  };
  if (mode !== 'tarot') { bubble.innerHTML = intros[mode] || ''; setMood('happy'); }
  if (mode === 'hello') renderGrid(helloData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'walk') renderGrid(walkData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'quiz') renderQuiz();
  else if (mode === 'joke') renderGrid(jokeData, d => { bubble.innerHTML = d.text; setMood(d.mood); });
  else if (mode === 'tarot') renderTarot();
}

setMood('happy');
</script>
